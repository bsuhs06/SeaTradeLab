services:
  postgres:
    image: imresamu/postgis:16-3.4
    container_name: ais-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ais}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-ais_data}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-ais} -d $${POSTGRES_DB:-ais_data}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
