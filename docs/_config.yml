title: SeaTradeLab
description: "Open-source maritime intelligence. Track shadow fleet activity using free AIS data."
url: "https://bsuhs.github.io"
baseurl: "/seatradelab"
permalink: /blog/:year/:month/:day/:title/

theme: jekyll-theme-minimal

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
