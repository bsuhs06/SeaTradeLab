<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset='utf-8'>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}" media="screen" type="text/css">
  <link rel="stylesheet" href="{{ '/assets/css/print.css' | relative_url }}" media="print" type="text/css">
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}" media="screen" type="text/css">
  {% feed_meta %}
  {% seo %}
</head>
<body>
  <div id="container">
    <div class="inner">
      <header>
        <h1><a href="{{ '/' | relative_url }}" style="color: inherit; text-decoration: none;">{{ site.title | default: site.github.repository_name }}</a></h1>
        <h2>{{ site.description | default: site.github.project_tagline }}</h2>
      </header>

      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
        <a href="{{ '/blog' | relative_url }}" {% if page.url contains '/blog' %}class="active"{% endif %}>Blog</a>
        <a href="{{ '/datasets' | relative_url }}" {% if page.url contains '/datasets' %}class="active"{% endif %}>Datasets</a>
        <a href="{{ '/about' | relative_url }}" {% if page.url contains '/about' %}class="active"{% endif %}>About</a>
        <a href="https://github.com/bsuhs/seatradelab">GitHub</a>
      </nav>

      <hr>

      <section id="main_content">
        {{ content }}
      </section>

      <footer>
        <p>SeaTradeLab &middot; <a href="https://github.com/bsuhs/seatradelab">Source on GitHub</a> &middot; <a href="{{ '/feed.xml' | relative_url }}">RSS Feed</a></p>
        <p><small>Hosted on GitHub Pages &mdash; Theme by <a href="https://github.com/orderedlist">orderedlist</a></small></p>
      </footer>
    </div>
  </div>
</body>
</html>
